<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Axel & Nicky</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
  :root {
    --bg:#0f1117;--bg2:#1a1d27;--bg3:#222536;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#e8eaf0;--text2:#8b8fa8;--text3:#5a5e73;
    --green:#1D9E75;--gl:#4ade80;--red:#e05252;
    --blue:#4a8fd4;--purple:#7c6fdb;--amber:#d4900a;
    --r:10px;--rs:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  .page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:.5px solid var(--border)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1D9E75,#4a8fd4);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
  .logo-text h1{font-size:17px;font-weight:600}
  .logo-text p{font-size:12px;color:var(--text2)}
  .tr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 3s infinite}
  .dot.load{background:#EF9F27;animation:pulse .8s infinite}
  .dot.err{background:var(--red);animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #stxt{font-size:11px;color:var(--text2);max-width:380px}
  select,button{font-size:12px;padding:5px 10px;border:.5px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text2);cursor:pointer}
  button:hover{background:var(--bg3);color:var(--text)}
  .owners{display:flex;flex-direction:column;gap:2rem}
  .osec{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:1.5rem}
  .osec.total{border-color:rgba(29,158,117,.25)}
  .ohdr{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
  .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .av-a{background:rgba(74,143,212,.15);color:#4a8fd4}
  .av-n{background:rgba(200,90,150,.15);color:#d46fa0}
  .av-t{background:rgba(29,158,117,.15);color:var(--green)}
  .oname{font-size:16px;font-weight:600}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem}
  .mc{background:var(--bg3);border-radius:var(--rs);padding:10px 12px}
  .ml{font-size:11px;color:var(--text2);margin-bottom:4px}
  .mv{font-size:15px;font-weight:600;color:var(--text)}
  .mv.pos{color:var(--gl)}.mv.neg{color:var(--red)}.mv.neu{color:var(--text2)}
  .slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin:1.25rem 0 8px;display:flex;align-items:center;gap:6px}
  .pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
  .p-ars{background:rgba(74,143,212,.15);color:#4a8fd4}
  .p-usd{background:rgba(29,158,117,.15);color:var(--green)}
  .twrap{border:.5px solid var(--border);border-radius:var(--rs);overflow:hidden;overflow-x:auto;margin-bottom:2px}
  table{width:100%;border-collapse:collapse;min-width:580px}
  th{background:rgba(255,255,255,.03);color:var(--text2);font-weight:500;font-size:11px;text-align:left;padding:8px 12px;border-bottom:.5px solid var(--border);white-space:nowrap}
  th.tr,td.tr{text-align:right}
  td{padding:7px 12px;border-bottom:.5px solid var(--border);font-size:12px;color:var(--text);white-space:nowrap;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .tk{font-weight:600;font-size:13px}
  .lc{color:var(--text2);font-size:11px}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:capitalize}
  .b-cedear{background:rgba(74,143,212,.12);color:#4a8fd4}
  .b-accion{background:rgba(124,111,219,.12);color:var(--purple)}
  .b-bono{background:rgba(212,144,10,.12);color:var(--amber)}
  .b-stock{background:rgba(29,158,117,.12);color:var(--green)}
  .b-dolar{background:rgba(29,158,117,.08);color:#6ecfa8}
  .pos{color:var(--gl);font-weight:600}.neg{color:var(--red);font-weight:600}
  .pspan{cursor:pointer;border-bottom:1px dashed var(--text3);padding-bottom:1px}
  .pspan:hover{color:var(--blue);border-color:var(--blue)}
  .pinp{width:90px;font-size:12px;padding:2px 5px;border:.5px solid var(--blue);border-radius:4px;background:var(--bg3);color:var(--text);text-align:right}
  .ebtn{font-size:11px;padding:2px 8px;color:var(--text2);background:transparent;border:.5px dashed var(--border2);border-radius:4px;cursor:pointer}
  .ebtn:hover{color:var(--blue);border-color:var(--blue)}
  .errbox{background:rgba(224,82,82,.07);border:.5px solid rgba(224,82,82,.2);border-radius:var(--r);padding:1.25rem 1.5rem;color:var(--text2);line-height:1.7}
  .errbox strong{color:var(--red)}
  .errbox code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:12px}
  .empty{color:var(--text2);font-size:13px;padding:.5rem 0}
  @media(max-width:600px){.page{padding:1rem}header{flex-direction:column;align-items:flex-start}.mgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-chart-line"></i></div>
      <div class="logo-text"><h1>Portfolio</h1><p>Axel &amp; Nicky · Inversiones</p></div>
    </div>
    <div class="tr-right">
      <div class="dot load" id="dot"></div>
      <span id="stxt">Cargando...</span>
      <select id="isel" onchange="changeInterval(this.value)">
        <option value="60000">Cada 1 min</option>
        <option value="300000" selected>Cada 5 min</option>
        <option value="600000">Cada 10 min</option>
        <option value="1800000">Cada 30 min</option>
      </select>
      <button onclick="init()"><i class="ti ti-refresh"></i> Actualizar</button>
    </div>
  </header>
  <div id="main" class="owners"></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdgWXX4oDV7OTUDZTUgGanj5MvXTOsxEQ5ilCSFYHN_f_0K1pmhX7aHgiX1zwP0CQlJoJGhKFk4gSo/pub?gid=0&single=true&output=csv';
const PROXIES = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
// BYMA Open Data endpoints (no auth needed, with 20-min delay)
const BYMA_CEDEARS  = 'https://open.bymadata.com.ar/vanoms-be-core/rest/api/bymadata/free/cedears?Content-Type=application/json';
const BYMA_ACCIONES = 'https://open.bymadata.com.ar/vanoms-be-core/rest/api/bymadata/free/bluechips?Content-Type=application/json';
const BYMA_BONOS    = 'https://open.bymadata.com.ar/vanoms-be-core/rest/api/bymadata/free/government-bonds?Content-Type=application/json';

const ARS_TYPES = ['cedear','accion','bono'];
let portfolio = [], mktPrices = {}, manualPrices = {}, timerId = null;

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(s, msg) {
  document.getElementById('dot').className = 'dot ' + s;
  document.getElementById('stxt').textContent = msg;
}

// ── Parse number from Argentine format ──────────────────────────────────────
// Handles: "12894.12" (US dot decimal), "12.894,12" (AR), "12894,12"
function parseNum(raw) {
  if (!raw) return 0;
  raw = String(raw).trim();
  // Has both dot and comma
  if (raw.includes('.') && raw.includes(',')) {
    // "12.894,12" → dot is thousands, comma is decimal
    if (raw.indexOf('.') < raw.indexOf(',')) {
      return parseFloat(raw.replace(/\./g,'').replace(',','.')) || 0;
    }
    // "12,894.12" → comma is thousands, dot is decimal
    return parseFloat(raw.replace(/,/g,'')) || 0;
  }
  // Only comma → could be decimal separator "12894,12"
  if (raw.includes(',') && !raw.includes('.')) {
    const parts = raw.split(',');
    // If after comma ≤ 2 digits → decimal
    if (parts[1] && parts[1].length <= 2) return parseFloat(raw.replace(',','.')) || 0;
    // Otherwise thousands separator
    return parseFloat(raw.replace(/,/g,'')) || 0;
  }
  // Only dot → standard float
  return parseFloat(raw) || 0;
}

// ── Fetch CSV ────────────────────────────────────────────────────────────────
async function fetchCSV() {
  for (const make of PROXIES) {
    try {
      const r = await fetch(make(CSV_URL), { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const text = await r.text();
      let csv = text;
      if (text.trim().startsWith('{')) {
        try { csv = JSON.parse(text).contents || ''; } catch(e) {}
      }
      if (csv && csv.toLowerCase().includes('ticket')) return csv;
    } catch(e) {}
  }
  // Direct fetch last resort
  const r = await fetch(CSV_URL, { signal: AbortSignal.timeout(10000) });
  return r.text();
}

// ── Parse CSV ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c==='"') { inQ=!inQ; continue; }
      if (c===',' && !inQ) { cols.push(cur.trim()); cur=''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  }).filter(r => r[headers[0]]);
}

function colGet(r, ...names) {
  const keys = Object.keys(r);
  for (const n of names) {
    const k = keys.find(k => k.replace(/\s+/g,'').toLowerCase().includes(n.replace(/\s+/g,'').toLowerCase()));
    if (k && r[k]) return r[k];
  }
  return '';
}

function normalizeRow(r) {
  const ticker = colGet(r,'ticket','ticker').toUpperCase().trim();
  const qty    = parseNum(colGet(r,'cantidad'));
  const pc     = parseNum(colGet(r,'precio'));
  const raw    = colGet(r,'tipo').toLowerCase().trim();
  let tipo = 'cedear';
  if (raw.includes('accion')||raw.includes('acción')) tipo='accion';
  else if (raw.includes('bono'))  tipo='bono';
  else if (raw.includes('stock')) tipo='stock';
  else if (raw.includes('dolar')||raw.includes('usd')) tipo='dolar';
  const usd = parseNum(colGet(r,'cantidaddedolares','dolar','cantidad de'));
  return { ticker, qty, pc, tipo, lugar: colGet(r,'lugar'), owner: colGet(r,'dueño','dueno','owner').trim(), usd };
}

// ── Fetch BYMA prices ────────────────────────────────────────────────────────
async function fetchBYMAEndpoint(url) {
  for (const make of PROXIES.slice(0,2)) {
    try {
      const r = await fetch(make(url), { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const text = await r.text();
      let json = text;
      if (text.trim().startsWith('{')) {
        try { json = JSON.parse(text).contents || text; } catch(e) {}
      }
      const data = JSON.parse(json);
      // BYMA returns { data: [...] } or directly an array
      return Array.isArray(data) ? data : (data.data || data.content || []);
    } catch(e) {}
  }
  return [];
}

async function loadBYMAPrices() {
  const [cedears, acciones, bonos] = await Promise.all([
    fetchBYMAEndpoint(BYMA_CEDEARS),
    fetchBYMAEndpoint(BYMA_ACCIONES),
    fetchBYMAEndpoint(BYMA_BONOS),
  ]);
  const all = [...cedears, ...acciones, ...bonos];
  let count = 0;
  all.forEach(item => {
    // BYMA fields: symbol / symbolWithSuffix / last / trade / tradeQuantity
    const sym = (item.symbol || item.symbolWithSuffix || item.descripcionAbreviada || '').replace(/\s+/g,'').toUpperCase();
    const price = parseFloat(item.last || item.trade || item.precio || 0);
    if (sym && price > 0 && !manualPrices[sym]) {
      mktPrices[sym] = price;
      count++;
    }
  });
  return count;
}

// ── Edit price inline ────────────────────────────────────────────────────────
function startEdit(ticker) {
  const sp = document.getElementById('p-'+ticker);
  if (!sp) return;
  sp.innerHTML = `<input class="pinp" id="ei-${ticker}" value="${getPrice(ticker)||''}"
    onblur="saveEdit('${ticker}')" onkeydown="if(event.key==='Enter')saveEdit('${ticker}')"/>`;
  setTimeout(()=>{ const i=document.getElementById('ei-'+ticker); if(i) i.focus(); },20);
}
function saveEdit(ticker) {
  const i = document.getElementById('ei-'+ticker);
  if (!i) return;
  const v = parseFloat(i.value.replace(',','.'));
  if (!isNaN(v)&&v>0) manualPrices[ticker]=v;
  renderAll();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v,d=0) {
  if (v===null||v===undefined||isNaN(v)) return '—';
  return v.toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function sym(tipo) { return ARS_TYPES.includes(tipo)?'$':'USD '; }
function isARS(tipo) { return ARS_TYPES.includes(tipo); }
function getPrice(tk) { return manualPrices[tk]??mktPrices[tk]??null; }

// ── Summary ───────────────────────────────────────────────────────────────────
function calcSummary(items) {
  let iA=0,vA=0,iU=0,vU=0,cU=0;
  items.forEach(it => {
    const cp = getPrice(it.ticker);
    if (isARS(it.tipo)) { iA+=it.qty*it.pc; vA+=cp?it.qty*cp:it.qty*it.pc; }
    else if (it.tipo==='stock') { iU+=it.qty*it.pc; vU+=cp?it.qty*cp:it.qty*it.pc; }
    if (it.usd>0) cU+=it.usd;
  });
  return { iA,vA,gA:vA-iA, rA:iA>0?((vA-iA)/iA)*100:0,
           iU,vU,gU:vU-iU, rU:iU>0?((vU-iU)/iU)*100:0, cU };
}

// ── Table ─────────────────────────────────────────────────────────────────────
function buildTable(rows) {
  return `<div class="twrap"><table>
    <thead><tr>
      <th>Ticker</th><th>Tipo</th><th class="tr">Cant.</th>
      <th class="tr">P. compra</th><th class="tr">P. actual</th>
      <th class="tr">Valor total</th><th class="tr">Rentab.</th><th>Lugar</th>
    </tr></thead>
    <tbody>${rows.map(it=>{
      const cp=getPrice(it.ticker), s=sym(it.tipo);
      const inv=it.qty*it.pc, val=cp?it.qty*cp:null;
      const gain=val!==null?val-inv:null;
      const rp=gain!==null&&inv>0?(gain/inv)*100:null;
      const rc=rp!==null?(rp>=0?'pos':'neg'):'';
      const pd=cp
        ?`<span id="p-${it.ticker}" class="pspan" onclick="startEdit('${it.ticker}')" title="Click para editar">${s}${fmt(cp,2)}</span>`
        :`<span id="p-${it.ticker}"><button class="ebtn" onclick="startEdit('${it.ticker}')">ingresar</button></span>`;
      return `<tr>
        <td class="tk">${it.ticker}</td>
        <td><span class="badge b-${it.tipo}">${it.tipo}</span></td>
        <td class="tr">${fmt(it.qty)}</td>
        <td class="tr">${s}${fmt(it.pc,2)}</td>
        <td class="tr">${pd}</td>
        <td class="tr">${val!==null?s+fmt(val):'—'}</td>
        <td class="tr ${rc}">${rp!==null?(rp>=0?'+':'')+fmt(rp,1)+'%':'—'}</td>
        <td class="lc">${it.lugar}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

// ── Render owner block ────────────────────────────────────────────────────────
function renderOwner(label, avCls, items, isTotal) {
  const cls='osec'+(isTotal?' total':'');
  if (!items.length) return `<div class="${cls}"><div class="ohdr">
    <div class="av ${avCls}">${label.substring(0,2).toUpperCase()}</div>
    <span class="oname">${label}</span></div>
    <p class="empty">Sin posiciones cargadas.</p></div>`;

  const s = calcSummary(items);
  const cedears  = items.filter(i=>i.tipo==='cedear');
  const acciones = items.filter(i=>i.tipo==='accion');
  const bonos    = items.filter(i=>i.tipo==='bono');
  const stocks   = items.filter(i=>i.tipo==='stock');

  let m = '<div class="mgrid">';
  if (s.iA>0) m+=`
    <div class="mc"><div class="ml">Invertido ARS</div><div class="mv">$${fmt(s.iA)}</div></div>
    <div class="mc"><div class="ml">Valor actual ARS</div><div class="mv">$${fmt(s.vA)}</div></div>
    <div class="mc"><div class="ml">Ganancia ARS</div><div class="mv ${s.gA>=0?'pos':'neg'}">$${fmt(s.gA)}</div></div>
    <div class="mc"><div class="ml">Rentab. ARS</div><div class="mv ${s.rA>=0?'pos':'neg'}">${s.rA>=0?'+':''}${fmt(s.rA,1)}%</div></div>`;
  if (s.iU>0) m+=`
    <div class="mc"><div class="ml">Invertido USD</div><div class="mv neu">USD ${fmt(s.iU,0)}</div></div>
    <div class="mc"><div class="ml">Valor actual USD</div><div class="mv">USD ${fmt(s.vU,0)}</div></div>
    <div class="mc"><div class="ml">Ganancia USD</div><div class="mv ${s.gU>=0?'pos':'neg'}">USD ${fmt(s.gU,0)}</div></div>`;
  if (s.cU>0) m+=`<div class="mc"><div class="ml">Dólares</div><div class="mv neu">USD ${fmt(s.cU)}</div></div>`;
  m += '</div>';

  let t = '';
  if (cedears.length)  t+=`<p class="slbl">CEDEARs <span class="pill p-ars">ARS</span></p>`+buildTable(cedears);
  if (acciones.length) t+=`<p class="slbl">Acciones <span class="pill p-ars">ARS</span></p>`+buildTable(acciones);
  if (bonos.length)    t+=`<p class="slbl">Bonos <span class="pill p-ars">ARS</span></p>`+buildTable(bonos);
  if (stocks.length)   t+=`<p class="slbl">Stocks <span class="pill p-usd">USD</span></p>`+buildTable(stocks);

  return `<div class="${cls}"><div class="ohdr">
    <div class="av ${avCls}">${label.substring(0,2).toUpperCase()}</div>
    <span class="oname">${label}</span></div>${m}${t}</div>`;
}

// ── Render all ────────────────────────────────────────────────────────────────
function renderAll() {
  const owners = [...new Set(portfolio.map(p=>p.owner))].filter(Boolean).sort();
  let html = '';
  owners.forEach(own => {
    const av = own.toLowerCase().startsWith('ax')?'av-a':own.toLowerCase().startsWith('ni')?'av-n':'av-t';
    html += renderOwner(own, av, portfolio.filter(p=>p.owner===own), false);
  });
  if (owners.length>1) html += renderOwner('Portfolio total','av-t',portfolio,true);
  document.getElementById('main').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  setStatus('load','Leyendo planilla...');
  try {
    const csvText = await fetchCSV();
    const rows = parseCSV(csvText);
    if (!rows.length) throw new Error('Sin filas en el CSV');
    portfolio = rows.map(normalizeRow).filter(r=>r.ticker&&r.qty>0);
    if (!portfolio.length) throw new Error('Sin posiciones válidas');

    setStatus('load',`${portfolio.length} posiciones · buscando precios en BYMA...`);
    renderAll();

    const ok = await loadBYMAPrices();
    const now = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    setStatus('ok',
      ok>0
        ?`${portfolio.length} posiciones · ${ok} precios de BYMA · ${now} (20 min delay)`
        :`${portfolio.length} posiciones · BYMA no disponible · ${now} — hacé click en precio para ingresarlo`
    );
    renderAll();
  } catch(err) {
    setStatus('err','Error al cargar');
    document.getElementById('main').innerHTML=`<div class="errbox">
      <strong>Error al cargar la planilla.</strong><br><br>
      <code>${err.message}</code><br><br>
      Verificá que el Google Sheet esté publicado como CSV:<br>
      Archivo → Compartir → Publicar en la web → Hoja1 → CSV → Publicar
    </div>`;
  }
}

function changeInterval(v) {
  if (timerId) clearInterval(timerId);
  timerId = setInterval(init, parseInt(v));
}

init();
timerId = setInterval(init, 300000);
</script>
</body>
</html>
